<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="ODD Shop iris">
  <defs>
    <linearGradient id="odd-shop-brand-bg" x1="9" y1="8" x2="55" y2="57" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff3d9a"/>
      <stop offset=".55" stop-color="#6a5cff"/>
      <stop offset="1" stop-color="#00d1b2"/>
    </linearGradient>
    <radialGradient id="odd-shop-brand-eye" cx="38%" cy="32%" r="70%">
      <stop offset="0" stop-color="#fff"/>
      <stop offset=".72" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#d8e9ff"/>
    </radialGradient>
    <filter id="odd-shop-brand-shadow" x="-25%" y="-25%" width="150%" height="150%">
      <feDropShadow dx="0" dy="7" stdDeviation="5" flood-color="#28154f" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="64" height="64" rx="17" fill="url(#odd-shop-brand-bg)"/>
  <circle cx="32" cy="32" r="21" fill="url(#odd-shop-brand-eye)" filter="url(#odd-shop-brand-shadow)"/>
  <g class="odd-shop-brand-pupil">
    <circle cx="35" cy="31" r="9" fill="#080716"/>
    <circle cx="38.8" cy="27.4" r="2.2" fill="#6ee7ff"/>
  </g>
  <path d="M48 45.5c3.6-.8 6.3-2.7 7.9-5.4-1 5.1-4.3 8.7-10 10.6 1.2-1.7 1.9-3.4 2.1-5.2Z" fill="#fff" opacity=".75"/>
  <style>
    @media (prefers-reduced-motion:no-preference){
      .odd-shop-brand-pupil{animation:odd-shop-brand-gaze 11s ease-in-out infinite;transform-origin:32px 32px}
      @keyframes odd-shop-brand-gaze{0%,86%,90%,100%{transform:translate(0,0) scaleY(1)}22%{transform:translate(3px,-1px) scaleY(1)}44%{transform:translate(-2px,2px) scaleY(1)}88%{transform:translate(0,0) scaleY(.08)}}
    }
  </style>
</svg>

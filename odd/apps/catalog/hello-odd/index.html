<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hello ODD</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #101014;
    --fg: #e8eaf3;
    --mute: #8d92a8;
    --accent: #b04be1;
  }
  html, body { height: 100%; margin: 0; background: var(--bg); color: var(--fg); }
  body {
    font: 14px/1.5 -apple-system, system-ui, "Segoe UI", sans-serif;
    display: grid;
    grid-template-rows: auto 1fr auto;
    padding: 24px;
    box-sizing: border-box;
  }
  h1 { margin: 0 0 8px; font-size: 20px; font-weight: 600; letter-spacing: -0.01em; }
  p  { margin: 0 0 16px; color: var(--mute); max-width: 48ch; }
  main {
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 18px;
  }
  .eye {
    width: 96px;
    height: 96px;
    display: grid;
    place-items: center;
    font-size: 56px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 32%, #ffffff, #d4d8ea);
    box-shadow:
      inset 0 0 0 2px rgba(0,0,0,.08),
      0 14px 30px rgba(20,10,40,.32);
  }
  .eye::after {
    content: "";
    width: 32px; height: 32px;
    background: radial-gradient(circle at 30% 30%, #7ee3ff, #0a356b);
    border-radius: 50%;
    box-shadow: 0 0 0 6px rgba(0,0,0,.04);
    transform: translate(-8px, -4px);
    transition: transform .18s ease;
  }
  button {
    font: inherit;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--fg);
    cursor: pointer;
    transition: background .14s ease, color .14s ease;
  }
  button:hover { background: var(--accent); color: #fff; }
  footer {
    color: var(--mute);
    font-size: 12px;
    text-align: right;
  }
  code {
    background: rgba(255,255,255,.06);
    padding: 1px 5px;
    border-radius: 4px;
    font-size: 12px;
  }
</style>
</head>
<body>
  <header>
    <h1>Hello ODD</h1>
    <p>This is the reference app — vanilla HTML, no framework, no build. It's what every ODD app looks like in the simplest possible form.</p>
  </header>
  <main>
    <div class="eye" id="eye"></div>
    <div id="status">The eye follows your cursor.</div>
    <button id="wink">Ask the eye to wink</button>
  </main>
  <footer>
    <div>Defined by <code>odd/apps/catalog/hello-odd/manifest.json</code>.</div>
  </footer>
  <script>
    ( function () {
      var eye = document.getElementById( 'eye' );
      var status = document.getElementById( 'status' );
      function track( e ) {
        var r = eye.getBoundingClientRect();
        var cx = r.left + r.width / 2;
        var cy = r.top + r.height / 2;
        var dx = Math.max( -10, Math.min( 10, ( e.clientX - cx ) / 12 ) );
        var dy = Math.max( -8, Math.min( 8, ( e.clientY - cy ) / 12 ) );
        eye.style.setProperty( '--dx', dx + 'px' );
        eye.style.setProperty( '--dy', dy + 'px' );
        eye.style.cssText += ';--dx:' + dx + 'px;--dy:' + dy + 'px;';
        var pupil = eye;
        pupil.style.position = 'relative';
      }
      document.addEventListener( 'pointermove', track );
      document.getElementById( 'wink' ).addEventListener( 'click', function () {
        status.textContent = 'Wink requested. See the corner of the desktop.';
        try {
          if ( window.parent && window.parent !== window ) {
            // Cross-origin safe: post a message. The host doesn't
            // currently listen for it but this is a good place to
            // demonstrate the contract for future two-way apps.
            window.parent.postMessage( { source: 'odd-app', slug: 'hello-odd', type: 'wink' }, '*' );
          }
        } catch ( e ) {}
      } );
    } )();
  </script>
</body>
</html>

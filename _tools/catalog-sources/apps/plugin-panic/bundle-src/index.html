<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Plugin Panic</title>
		<link rel="stylesheet" href="./styles.css">
	</head>
	<body class="plugin-panic">
		<main class="app-shell" aria-labelledby="app-title">
			<header class="topbar">
				<div class="brand">
					<span class="brand-mark" aria-hidden="true"></span>
					<div class="brand-copy">
						<span class="deck-pill">Dependency stack</span>
						<h1 id="app-title">Plugin Panic</h1>
						<p id="status-line" class="status-line" aria-live="polite">Stack updates. Resolve dependencies. Do not panic.</p>
					</div>
				</div>
				<div class="score-strip" aria-label="Game status">
					<div class="score-item"><span class="score-label">Score</span><strong id="score">0</strong></div>
					<div class="score-item"><span class="score-label">Level</span><strong id="level">1</strong></div>
					<div class="score-item"><span class="score-label">Best</span><strong id="best">0</strong></div>
				</div>
			</header>
			<section class="game-layout">
				<div class="canvas-wrap">
					<div class="stage-shell" aria-label="Plugin Panic falling-block board">
						<div class="stage-glow" aria-hidden="true"></div>
						<div class="stage-meter" aria-hidden="true"><span id="queue-meter"></span></div>
						<canvas id="game-canvas" width="360" height="720"></canvas>
					</div>
				</div>
				<aside class="side-panel">
					<div class="console-cap" aria-hidden="true">
						<span>Update Deck</span>
						<i></i>
					</div>
					<div class="plugin-card">
						<div class="plugin-portrait" aria-hidden="true"></div>
						<div class="plugin-card__body">
							<p class="panel-label">Queue status</p>
							<p id="queue-line" class="readout">Updates waiting.</p>
							<div class="signal-bars" aria-hidden="true">
								<span></span><span></span><span></span><span></span><span></span>
							</div>
						</div>
					</div>
					<div class="preview-grid">
						<div class="mini-card"><p class="panel-label">Next</p><canvas id="next-canvas" width="96" height="96"></canvas></div>
						<div class="mini-card"><p class="panel-label">Hold</p><canvas id="hold-canvas" width="96" height="96"></canvas></div>
					</div>
					<div class="control-deck">
						<div class="button-grid">
							<button type="button" data-action="left" aria-label="Move left">Left</button>
							<button type="button" data-action="rotate" aria-label="Rotate">Rotate</button>
							<button type="button" data-action="right" aria-label="Move right">Right</button>
							<button type="button" data-action="drop" aria-label="Drop">Drop</button>
							<button type="button" data-action="hold" aria-label="Hold">Hold</button>
							<button type="button" data-action="pause" aria-label="Pause">Pause</button>
						</div>
						<button id="reset-button" class="primary-button" type="button">New Stack</button>
					</div>
				</aside>
			</section>
		</main>
		<section id="overlay" class="overlay" aria-hidden="true">
			<div class="overlay-card" role="dialog" aria-modal="true" aria-labelledby="overlay-title">
				<p class="panel-label">Dependency conflict</p>
				<h2 id="overlay-title">Plugin stack crashed</h2>
				<p id="overlay-line">Rollback, breathe, try again.</p>
				<button id="overlay-reset" class="primary-button" type="button">Resolve Again</button>
			</div>
		</section>
		<script src="./app.js"></script>
	</body>
</html>

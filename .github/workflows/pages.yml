name: pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '_tools/catalog-sources/**'
      - '_tools/build-catalog.py'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python catalog dependencies
        run: python -m pip install --quiet -r requirements-catalog.txt

      # Rebuild the remote catalog on every deploy so /catalog/v1/
      # is always in sync with whatever landed on main. The builder
      # is deterministic; identical source trees produce identical
      # bundles + registry, so a no-op content change still produces
      # the same artifact bytes.
      - name: Build remote catalog
        id: catalog
        env:
          ODD_CATALOG_SIGNING_KEY: ${{ secrets.ODD_CATALOG_SIGNING_KEY }}
          ODD_CATALOG_REQUIRE_SIGNATURE: '1'
        run: |
          python3 _tools/build-catalog.py
          ls -la site/catalog/v1/
          echo 'catalog bundles:' && ls site/catalog/v1/bundles/ | wc -l
          echo "registry_sha256=$(sha256sum site/catalog/v1/registry.json | awk '{print $1}')" >> "$GITHUB_OUTPUT"
          echo "registry_signature_sha256=$(sha256sum site/catalog/v1/registry.json.sig | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Validate catalog before publishing
        env:
          ODD_VALIDATE_REBUILD: '1'
          ODD_VALIDATE_REQUIRE_CATALOG_SIGNATURE: '1'
          ODD_CATALOG_SIGNING_KEY: ${{ secrets.ODD_CATALOG_SIGNING_KEY }}
        run: odd/bin/validate-catalog

      - uses: actions/configure-pages@v6
        with:
          # Auto-enable Pages on first run so we don't have to click
          # through repo settings just to publish site/.
          enablement: true
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v5

      - name: Smoke test published catalog artifacts
        env:
          EXPECTED_REGISTRY_SHA256: ${{ steps.catalog.outputs.registry_sha256 }}
          EXPECTED_REGISTRY_SIGNATURE_SHA256: ${{ steps.catalog.outputs.registry_signature_sha256 }}
          ODD_CATALOG_PUBLIC_KEY: '2aIvGPQMF//a9ciDvQ8GST7Q8QhfVsM6h1HB3/Td5Gk='
        run: |
          python3 - <<'PY'
          import base64
          import hashlib
          import io
          import json
          import os
          import time
          import urllib.request
          from PIL import Image
          from nacl.exceptions import BadSignatureError
          from nacl.signing import VerifyKey

          registry_url = "https://odd.regionallyfamous.com/catalog/v1/registry.json"
          signature_url = "https://odd.regionallyfamous.com/catalog/v1/registry.json.sig"
          expected_registry_sha = os.environ.get("EXPECTED_REGISTRY_SHA256", "")
          expected_signature_sha = os.environ.get("EXPECTED_REGISTRY_SIGNATURE_SHA256", "")
          public_key = base64.b64decode(os.environ["ODD_CATALOG_PUBLIC_KEY"], validate=True)
          required_types = {"scene", "icon-set", "cursor-set", "widget"}
          required_widgets = {"sticky", "eight-ball"}

          def fetch(url):
              last = None
              for attempt in range(5):
                  try:
                      req = urllib.request.Request(url, headers={"User-Agent": "ODD catalog smoke"})
                      with urllib.request.urlopen(req, timeout=20) as res:
                          if res.status != 200:
                              raise RuntimeError(f"{url} returned HTTP {res.status}")
                          return res.read()
                  except Exception as exc:
                      last = exc
                      time.sleep(2 * (attempt + 1))
              raise SystemExit(f"failed to fetch {url}: {last}")

          registry_body = b""
          signature_body = b""
          for attempt in range(12):
              registry_body = fetch(registry_url)
              signature_body = fetch(signature_url)
              actual_sha = hashlib.sha256(registry_body).hexdigest()
              actual_sig_sha = hashlib.sha256(signature_body).hexdigest()
              fresh_registry = not expected_registry_sha or actual_sha == expected_registry_sha
              fresh_signature = not expected_signature_sha or actual_sig_sha == expected_signature_sha
              if fresh_registry and fresh_signature:
                  break
              print(
                  f"published catalog not fresh yet on attempt {attempt + 1}: "
                  f"registry={actual_sha} signature={actual_sig_sha}"
              )
              time.sleep(5)
          else:
              raise SystemExit(
                  "published registry/signature sha256 did not match the just-built catalog"
              )

          try:
              VerifyKey(public_key).verify(
                  registry_body,
                  base64.b64decode(signature_body.strip(), validate=True),
              )
          except BadSignatureError as exc:
              raise SystemExit("published registry signature did not verify") from exc

          registry = json.loads(registry_body)
          bundles = registry.get("bundles", [])
          by_type = {}
          for row in bundles:
              by_type.setdefault(row.get("type"), []).append(row)
          missing_types = sorted(required_types - set(by_type))
          if missing_types:
              raise SystemExit(f"missing bundle types in published registry: {missing_types}")

          widget_rows = {
              row.get("slug"): row
              for row in bundles
              if row.get("type") == "widget" and row.get("slug") in required_widgets
          }
          missing = required_widgets - set(widget_rows)
          if missing:
              raise SystemExit(f"missing widget rows: {sorted(missing)}")

          representatives = []
          for type_name in sorted(required_types):
              representatives.append(by_type[type_name][0])
          representatives.extend(widget_rows.values())

          def verify_raster_image(url, slug, field, *, allow_svg=False):
              body = fetch(url)
              head = body[:300].lstrip()
              if allow_svg and b"<svg" in head:
                  return body
              try:
                  with Image.open(io.BytesIO(body)) as img:
                      img.verify()
                  with Image.open(io.BytesIO(body)) as img:
                      width, height = img.size
                      fmt = img.format
              except Exception as exc:
                  raise SystemExit(f"{slug}: {field} did not decode as an image ({exc})") from exc
              if width < 16 or height < 16:
                  raise SystemExit(f"{slug}: {field} image dimensions too small: {width}x{height}")
              if fmt not in {"PNG", "WEBP", "JPEG"}:
                  raise SystemExit(f"{slug}: {field} returned unsupported image format {fmt}")
              return body

          for row in representatives:
              slug = row.get("slug")
              icon_url = row.get("icon_url")
              card_url = row.get("card_url")
              download_url = row.get("download_url")
              if not icon_url:
                  raise SystemExit(f"{slug}: missing icon_url")
              if not card_url:
                  raise SystemExit(f"{slug}: missing card_url")
              if not download_url:
                  raise SystemExit(f"{slug}: missing download_url")
              verify_raster_image(icon_url, slug, "icon_url", allow_svg=True)
              verify_raster_image(card_url, slug, "card_url")
              bundle_body = fetch(download_url)
              if bundle_body[:4] not in (b"PK\x03\x04", b"PK\x05\x06"):
                  raise SystemExit(f"{slug}: download_url did not return a ZIP/.wp archive")
              if row.get("size") and len(bundle_body) != row["size"]:
                  raise SystemExit(f"{slug}: bundle size mismatch in published catalog")
              if row.get("sha256") and hashlib.sha256(bundle_body).hexdigest() != row["sha256"]:
                  raise SystemExit(f"{slug}: bundle sha256 mismatch in published catalog")
          print("published catalog artifacts ok")
          PY

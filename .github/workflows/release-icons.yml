name: release-icons

# Tagging `b-roll-icons-v<semver>` builds a zip of the b-roll-icons/
# subtree and uploads it as the tag's release asset. Separate from
# the parent b-roll workflow (triggered by `v*` tags) so the two
# plugins can ship on their own cadences without coupling.

on:
  push:
    tags:
      - 'b-roll-icons-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: PHP syntax check
        run: |
          set -e
          for f in b-roll-icons/*.php b-roll-icons/includes/*.php; do
            php -l "$f"
          done

      - name: Validate icon sets
        run: b-roll-icons/bin/validate-sets

      - name: Build zip
        run: b-roll-icons/bin/build-zip

      - name: Create GitHub release and upload zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag="${GITHUB_REF_NAME}"
          # --latest=false so b-roll's `/releases/latest/download/b-roll.zip`
          # redirect isn't stolen by an icons release. Both plugins live in
          # this repo but release on independent cadences; the blueprint
          # pins b-roll-icons by explicit tag anyway.
          if ! gh release create "$tag" dist/b-roll-icons.zip \
              --title "$tag" \
              --latest=false \
              --generate-notes; then
              echo "release create failed - retrying after 3s"
              sleep 3
              if gh release view "$tag" >/dev/null 2>&1; then
                  gh release upload "$tag" dist/b-roll-icons.zip --clobber
              else
                  gh release create "$tag" dist/b-roll-icons.zip \
                      --title "$tag" \
                      --latest=false \
                      --generate-notes
              fi
          fi

      - name: Verify download URL
        run: |
          set -e
          url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${GITHUB_REF_NAME}/b-roll-icons.zip"
          echo "checking $url"
          status=$(curl -sI -o /dev/null -w '%{http_code}' -L "$url")
          echo "final status: $status"
          if [[ "$status" != "200" ]]; then
              echo "error: expected 200 after redirects, got $status" >&2
              exit 1
          fi

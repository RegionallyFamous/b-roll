name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

jobs:
  validate-scenes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: odd/bin/validate-scenes

  validate-icon-sets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: odd/bin/validate-icon-sets

  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: odd/bin/check-version

  json-valid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Parse every JSON file
        run: |
          set -e
          MANIFESTS=$(find odd/assets/icons -name manifest.json -maxdepth 2 -type f)
          for f in blueprint.json odd/src/wallpaper/scenes.json $MANIFESTS; do
              echo "  $f"
              python3 -c "import json,sys; json.load(open('$f'))"
          done

  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm test

  phpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: composer:v2
      - name: Cache composer deps
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.json') }}
          restore-keys: composer-
      - run: composer install --no-progress --no-interaction --prefer-dist
      - run: composer phpcs

  phpunit:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Matrix is PHP-only: wp-phpunit/wp-phpunit is locked against
        # modern WP core (it expects wp-includes/class-wpdb.php) so
        # testing against WP 6.0 here would require per-matrix
        # version juggling. install-smoke.yml already boots the
        # plugin against real, live WordPress end-to-end, so the
        # value of a WP-version matrix dimension on PHPUnit is low.
        php: ['7.4', '8.0', '8.2']
        wp: ['latest']
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mysqli, zip, dom
          coverage: none
          tools: composer:v2
      - name: Cache composer deps
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.json') }}
          restore-keys: composer-${{ matrix.php }}-
      - name: Wait for MySQL
        run: |
          for i in $(seq 1 30); do
            if mysqladmin ping -h 127.0.0.1 -u root -proot --silent; then
              echo "mysql ready"; exit 0
            fi
            sleep 2
          done
          echo "mysql never came up"; exit 1
      - run: composer install --no-progress --no-interaction --prefer-dist
      - name: Install WordPress test scaffolding
        env:
          WP_VERSION: ${{ matrix.wp }}
        run: |
          bash odd/tests/php/install-wp-tests.sh wordpress_test root root 127.0.0.1:3306 "$WP_VERSION"
      - run: composer phpunit

  zip-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: odd/bin/build-zip
      - uses: actions/upload-artifact@v4
        with:
          name: odd-zip
          path: dist/odd.zip
          if-no-files-found: error
          retention-days: 14

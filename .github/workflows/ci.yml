name: ci

on:
  pull_request:
  push:
    branches: [main]
  workflow_call:

jobs:
  validate-scenes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: odd/bin/validate-scenes

  validate-icon-sets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: odd/bin/validate-icon-sets

  check-version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: odd/bin/check-version

  json-valid:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Parse every JSON file
        run: |
          set -e
          MANIFESTS=$(find odd/assets/icons -name manifest.json -maxdepth 2 -type f)
          for f in blueprint.json odd/src/wallpaper/scenes.json $MANIFESTS; do
              echo "  $f"
              python3 -c "import json,sys; json.load(open('$f'))"
          done

  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install --no-audit --no-fund
      - run: npm test

  phpcs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: composer:v2
      - name: Cache composer deps
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.json') }}
          restore-keys: composer-
      - run: composer install --no-progress --no-interaction --prefer-dist
      - run: composer phpcs

  zip-budget:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - run: odd/bin/build-zip
      - uses: actions/upload-artifact@v4
        with:
          name: odd-zip
          path: dist/odd.zip
          if-no-files-found: error
          retention-days: 14

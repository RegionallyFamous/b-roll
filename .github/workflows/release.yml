name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Assert tag matches committed version
        run: |
          set -e
          tag="${GITHUB_REF_NAME}"
          expected="${tag#v}"
          bin/check-version --expect "$expected"

      - name: Run scene + blueprint validators
        run: |
          set -e
          bin/validate-scenes
          bin/check-blueprint

      - name: Build zip
        run: bin/build-zip

      - name: Create GitHub release and upload zip
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          tag="${GITHUB_REF_NAME}"
          # First attempt; retry once after a short nap if the asset upload
          # hits the "Error creating policy" 409 flake called out in CLAUDE.md.
          if ! gh release create "$tag" dist/b-roll.zip \
              --title "$tag" \
              --generate-notes; then
              echo "release create failed - retrying after 3s"
              sleep 3
              # If the release itself was already created, just re-upload.
              if gh release view "$tag" >/dev/null 2>&1; then
                  gh release upload "$tag" dist/b-roll.zip --clobber
              else
                  gh release create "$tag" dist/b-roll.zip \
                      --title "$tag" \
                      --generate-notes
              fi
          fi

      - name: Verify latest download redirect
        run: |
          set -e
          url="https://github.com/${GITHUB_REPOSITORY}/releases/latest/download/b-roll.zip"
          echo "checking $url"
          status=$(curl -sI -o /dev/null -w '%{http_code}' -L "$url")
          echo "final status: $status"
          if [[ "$status" != "200" ]]; then
              echo "error: expected 200 after redirects, got $status" >&2
              exit 1
          fi

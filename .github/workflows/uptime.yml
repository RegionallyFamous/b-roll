name: uptime

# Probes the three front-door URLs every 30 min: the Playground demo,
# the raw blueprint.json on main, and the latest GitHub release zip.
# If anything is unreachable, a tracking issue is opened (or reused)
# under the `uptime-auto` label so silent breakage gets noticed.

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Probe URLs
        id: probe
        run: |
          set +e
          : >/tmp/failures.txt

          check_http() {
            local name="$1" url="$2" expected="$3"
            local code
            code=$(curl -sSL -I -o /dev/null -w '%{http_code}' --max-time 30 "$url")
            if [[ ",$expected," == *",$code,"* ]]; then
              echo "OK   $name $code $url"
            else
              echo "FAIL $name got $code (expected $expected) $url"
              echo "$name|$url|$code" >>/tmp/failures.txt
            fi
          }

          check_parse_json() {
            local name="$1" url="$2"
            local body http
            body=$(curl -sSL --max-time 30 "$url")
            http=$?
            if [[ $http -ne 0 ]]; then
              echo "FAIL $name curl exit=$http $url"
              echo "$name|$url|curl=$http" >>/tmp/failures.txt
              return
            fi
            if echo "$body" | jq empty 2>/tmp/jq.err; then
              echo "OK   $name parsed JSON $url"
            else
              echo "FAIL $name did not parse as JSON $url"
              echo "$name|$url|jq=$(cat /tmp/jq.err)" >>/tmp/failures.txt
            fi
          }

          check_http       "playground-demo" "https://odd.regionallyfamous.com/playground/" "200"
          check_parse_json "blueprint-json"  "https://raw.githubusercontent.com/RegionallyFamous/odd/main/blueprint.json"
          check_http       "latest-zip"      "https://github.com/RegionallyFamous/odd/releases/latest/download/odd.zip" "200,302"

          if [[ -s /tmp/failures.txt ]]; then
            echo "--- failures ---"
            cat /tmp/failures.txt
            echo "status=fail" >>"$GITHUB_OUTPUT"
          else
            echo "status=ok" >>"$GITHUB_OUTPUT"
          fi

      - name: Open or update uptime issue on failure
        if: steps.probe.outputs.status == 'fail'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          body=$(awk -F'|' '{ printf "- **%s** %s → `%s`\n", $1, $2, $3 }' /tmp/failures.txt)
          title="uptime: probe failed on $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Reuse an open issue with the uptime-auto label if one exists,
          # so the bot doesn't spam new issues every 30 min.
          existing=$(gh issue list --label uptime-auto --state open --limit 1 --json number -q '.[0].number' || true)

          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body "$(printf 'New failures at %s:\n\n%s\n' "$(date -u)" "$body")"
          else
            gh label create uptime-auto --description "Autogenerated uptime probe failures" --color "ededed" 2>/dev/null || true
            gh issue create \
              --title "$title" \
              --label uptime-auto \
              --body "$(printf 'ODD uptime probe failed. First failure snapshot:\n\n%s\n' "$body")"
          fi

      - name: Close uptime issue on recovery
        if: steps.probe.outputs.status == 'ok'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          existing=$(gh issue list --label uptime-auto --state open --limit 1 --json number -q '.[0].number' || true)
          if [[ -n "$existing" ]]; then
            gh issue comment "$existing" --body "Recovered at $(date -u). Closing."
            gh issue close "$existing"
          fi
